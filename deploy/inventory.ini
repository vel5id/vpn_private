# Inventory for VPN infrastructure
# Update with actual IPs after provisioning servers

[vpn_nodes]
us-east ansible_host=203.0.113.10 region=us-east server_name="US East"
eu-west ansible_host=203.0.113.20 region=eu-west server_name="EU West"
asia-tokyo ansible_host=203.0.113.30 region=asia-tokyo server_name="Asia Tokyo"

[vpn_nodes:vars]
ansible_user=deploy
ansible_ssh_private_key_file=~/.ssh/vpn_deploy
ansible_python_interpreter=/usr/bin/python3

[api]
api-server ansible_host=203.0.113.100

[api:vars]
ansible_user=deploy
ansible_ssh_private_key_file=~/.ssh/vpn_deploy
ansible_python_interpreter=/usr/bin/python3

[monitoring]
api-server
